name: Auto Tag from package.json

permissions:
  contents: write

on:
  push:
    branches:
      - master
      - beta

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Read version from package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Determine tag
        run: |
          if [[ "${{ github.ref_name }}" == "beta" ]]; then
            echo "TAG_NAME=beta" >> $GITHUB_ENV
            echo "IS_BETA=true" >> $GITHUB_ENV
          else
            echo "TAG_NAME=v$PACKAGE_VERSION" >> $GITHUB_ENV
            echo "IS_BETA=false" >> $GITHUB_ENV
          fi

      - name: Create or update tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ "${{ env.IS_BETA }}" == "true" ]]; then
            git tag -f beta
            git push origin refs/tags/beta --force
          else
            if git rev-parse "${{ env.TAG_NAME }}" >/dev/null 2>&1; then
              echo "Tag ${{ env.TAG_NAME }} already exists. Skipping."
            else
              git tag ${{ env.TAG_NAME }}
              git push origin ${{ env.TAG_NAME }}
            fi
          fi