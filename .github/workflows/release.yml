name: Build & Release Tampermonkey Script

permissions:
  contents: write

on:
  workflow_run:
    workflows: ["Auto Tag from package.json"]
    types:
      - completed

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - name: Determine tag and release type
        id: release_info
        run: |
          # ... your existing logic ...
          if [[ "${{ github.event.workflow_run.head_branch }}" == "dev" ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "make_latest=false" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "make_latest=true" >> $GITHUB_OUTPUT
          fi


      - name: Build script
        run: npm run build
        env:
          OVERRIDE_VERSION: ${{ env.BUILD_VERSION }}
          IS_BETA: ${{ env.IS_PRERELEASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.PACKAGE_NAME }} ${{ env.TAG_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          prerelease: ${{ steps.release_info.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.release_info.outputs.make_latest }}
          files: dist/script.user.js
