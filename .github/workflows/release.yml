name: Build & Release Tampermonkey Script

permissions:
  contents: write

on:
  workflow_run:
    workflows: ["Auto Tag from package.json"]
    types:
      - completed

jobs:
  release:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          check-latest: true

      - name: Install dependencies
        run: npm ci

      - name: Determine tag and release type
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_NAME=$NAME" >> $GITHUB_ENV
          if [[ "${{ github.event.workflow_run.head_branch }}" == "beta" ]]; then
            echo "TAG_NAME=beta" >> $GITHUB_ENV
            echo "IS_PRERELEASE=true" >> $GITHUB_ENV
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            echo "BUILD_VERSION=${VERSION}-beta.${TIMESTAMP}" >> $GITHUB_ENV
          else
            git fetch --tags
            TAG=$(git describe --tags --abbrev=0)
            echo "TAG_NAME=$TAG" >> $GITHUB_ENV
            echo "IS_PRERELEASE=false" >> $GITHUB_ENV
            echo "BUILD_VERSION=$TAG" >> $GITHUB_ENV
          fi

      - name: Build script
        run: npm run build
        env:
          OVERRIDE_VERSION: ${{ env.BUILD_VERSION }}
          IS_BETA: ${{ env.IS_PRERELEASE }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.PACKAGE_NAME }} ${{ env.TAG_NAME }}
          tag_name: ${{ env.TAG_NAME }}
          prerelease: ${{ env.IS_PRERELEASE == 'true' }}
          make_latest: ${{ env.IS_PRERELEASE != 'true' }}
          files: dist/script.user.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}